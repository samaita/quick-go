<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tags — Quick Go</title>
<link rel="stylesheet" href="/css/main.css">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

</head>
<body>
  <nav class="nav" x-data="authState()" x-init="init()">
  <div class="nav__brand">
    <a href="/">Quick Go</a>
  </div>
  <div class="nav__links">
    <template x-if="user">
      <div class="nav__user">
        <img :src="user.avatar_url" :alt="user.name" class="nav__avatar" x-show="user.avatar_url">
        <span x-text="user.name"></span>
        <a href="/auth/logout" class="btn btn--sm btn--outline">Logout</a>
      </div>
    </template>
    <template x-if="!user && !loading">
      <a href="/auth/google" class="btn btn--primary">Login with Google</a>
    </template>
  </div>
</nav>

<script>
function authState() {
  return {
    user: null,
    loading: true,
    async init() {
      try {
        const res = await fetch('/auth/me', { credentials: 'include' });
        if (res.ok) {
          this.user = await res.json();
        }
      } catch (_) {}
      this.loading = false;
    }
  }
}
</script>

  <main class="container">
    


<div
  x-data="crudList('tags')"
  x-init="init()"
  class="page">

  <div class="page__header">
    <h1>Tags</h1>
    <a :href="'/' + 'tags' + '/form'" class="btn btn--primary">+ New</a>
  </div>

  
  <div x-show="error" class="alert alert--error" x-text="error"></div>

  
  <div x-show="loading" class="loading-row">Loading…</div>

  
  <div x-show="!loading && rows.length > 0" class="table-wrap">
    <table class="table">
      <thead>
        <tr>
          <template x-for="col in columns" :key="col">
            <th x-text="col"></th>
          </template>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <template x-for="row in rows" :key="row[pkField]">
          <tr>
            <template x-for="col in columns" :key="col">
              <td x-text="row[col]"></td>
            </template>
            <td class="actions">
              <a :href="'/' + 'tags' + '/form?id=' + row[pkField]" class="btn btn--sm btn--outline">Edit</a>
              <button @click="remove(row[pkField])" class="btn btn--sm btn--danger">Delete</button>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>

  
  <div x-show="!loading && rows.length === 0 && !error" class="empty-state">
    No records found. <a :href="'/' + 'tags' + '/form'">Create the first one.</a>
  </div>

  
  <div x-show="rows.length > 0" class="pagination">
    <button @click="prev()" :disabled="offset === 0" class="btn btn--sm btn--outline">← Prev</button>
    <span x-text="'Page ' + (Math.floor(offset/limit)+1)"></span>
    <button @click="next()" :disabled="rows.length < limit" class="btn btn--sm btn--outline">Next →</button>
  </div>
</div>

<script>
function crudList(urlPath) {
  return {
    rows: [],
    columns: [],
    pkField: 'id',
    loading: true,
    error: null,
    limit: 20,
    offset: 0,

    async init() {
      await this.load();
    },

    async load() {
      this.loading = true;
      this.error = null;
      try {
        const res = await fetch(`/api/${urlPath}?limit=${this.limit}&offset=${this.offset}`, {
          credentials: 'include'
        });
        if (res.status === 401) { window.location.href = '/'; return; }
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();
        this.rows = data || [];
        if (this.rows.length > 0) {
          this.columns = Object.keys(this.rows[0]);
          
          this.pkField = this.columns.find(c => c === 'id') ||
                         this.columns.find(c => c.endsWith('_id')) ||
                         this.columns[0];
        }
      } catch (e) {
        this.error = e.message;
      }
      this.loading = false;
    },

    async remove(id) {
      if (!confirm('Delete this record?')) return;
      try {
        const res = await fetch(`/api/${urlPath}/${id}`, {
          method: 'DELETE',
          credentials: 'include'
        });
        if (!res.ok) throw new Error('Delete failed');
        await this.load();
      } catch (e) {
        this.error = e.message;
      }
    },

    next() { this.offset += this.limit; this.load(); },
    prev() { this.offset = Math.max(0, this.offset - this.limit); this.load(); }
  }
}
</script>

  </main>
  <footer class="footer">
  <p>Built with <a href="https://github.com/samaita/quick-go" target="_blank" rel="noopener">quick-go</a></p>
</footer>

</body>
</html>
